<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Fish Feeder</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body{
    font-family:Arial;
    background:#202124;
    color:white;
    text-align:center;
    margin-top:60px;
}

button{
    width:220px;
    height:70px;
    font-size:24px;
    border:none;
    border-radius:12px;
    background:#00b894;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#009f7a;
}

#status{

margin-top:20px;
font-size:22px;
font-weight:bold;

}

</style>

</head>

<body>

<h1>🐠 Smart Fish Feeder</h1>

<div id="status">

Connecting...

</div>

<br><br>

<button onclick="feedNow()">

🍤 FEED NOW

</button>

<h2>Last Feed</h2>

<table style="margin:auto;font-size:20px;">

<tr>
<td>Type :</td>
<td id="feedType">--</td>
</tr>

<tr>
<td>Time :</td>
<td id="feedTime">--</td>
</tr>

<tr>
<td>Date :</td>
<td id="feedDate">--</td>
</tr>

</table>

<h2>Today's Schedule</h2>

<table style="margin:auto;font-size:20px">

<tr>
<td>Morning :</td>
<td id="morning">--</td>
</tr>

<tr>
<td>Evening :</td>
<td id="evening">--</td>
</tr>

<tr>
<td>Next Feed :</td>
<td id="nextFeed">--</td>
</tr>

</table>

<h2>Device Status</h2>

<table style="margin:auto;font-size:20px">

<tr>
<td>WiFi :</td>
<td id="wifi">--</td>
</tr>

<tr>
<td>IP :</td>
<td id="ip">--</td>
</tr>

</table>

<br>

<br><br>

<script>

const client = mqtt.connect(
'wss://8a1f06daa0544608991e3db3f3b71acc.s1.eu.hivemq.cloud:8884/mqtt',
{
username:'fishfeeder',
password:'Vijay@66166'
});

client.on('connect',()=>{

document.getElementById("status").innerHTML =
"Connecting to ESP32...";

client.subscribe("fishfeeder/state");

});


client.on('error',(err)=>{

document.getElementById("status").innerHTML=
"🔴 Connection Failed";

console.log(err);

});

client.on("message",(topic,message)=>{

if(topic=="fishfeeder/state")
{

let data = JSON.parse(message.toString());

document.getElementById("status").innerHTML =
data.online
?
"🟢 ESP32 Online (" + data.wifi + ")"
:
"🔴 ESP32 Offline";

document.getElementById("wifi").innerHTML =
data.wifi;

document.getElementById("ip").innerHTML =
data.ip;

document.getElementById("feedType").innerHTML =
data.lastFeed.type;

document.getElementById("feedTime").innerHTML =
data.lastFeed.time;

document.getElementById("feedDate").innerHTML =
data.lastFeed.date;

document.getElementById("morning").innerHTML =
data.morningDone ? "✅ Done":"⏳ Pending";

document.getElementById("evening").innerHTML =
data.eveningDone ? "✅ Done":"⏳ Pending";

document.getElementById("nextFeed").innerHTML =
data.nextFeed;

}

});

function feedNow()
{

client.publish(
'fishfeeder/cmd/feed',
'FEED'
);

alert("Feed Command Sent");

}

</script>

</body>
</html>
